# Redirect plain HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 8443 ssl;
    server_name armor-dashboard.hope.local;

    ssl_certificate     /etc/nginx/certs/siem.crt;
    ssl_certificate_key /etc/nginx/certs/siem.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    root  /usr/share/nginx/html;
    index index.html;

    # Angular SPA — return index.html for any route Angular handles
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy → FastAPI backend (strips the /api/ prefix)
    # e.g. /api/alerts  →  http://siem-api:8000/alerts
    location /api/ {
        proxy_pass            http://siem-api:8000/;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
        proxy_connect_timeout 10s;
    }
}
