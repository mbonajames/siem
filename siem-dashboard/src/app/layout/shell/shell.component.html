<mat-sidenav-container class="shell-container">
  <mat-sidenav
    #sidenav
    mode="side"
    [opened]="sidenavOpen"
    class="shell-sidenav"
  >
    <app-sidebar />
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <app-header (menuToggle)="toggleSidenav()" />
    <main class="main-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
