<div class="login-page">
  <div class="login-card">
    <div class="logo-area">
      <img class="hope-logo"
           src="https://www.hopeinternational.org/assets/images/brand/HOPE_H_yellowgray_web.svg"
           alt="Hope International" />
      <h1>Hope International</h1>
      <p class="org-name">SecOps</p>
    </div>

    <div class="divider"></div>

    <button mat-flat-button class="sign-in-btn" (click)="signIn()">
      <svg class="ms-logo" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect width="10" height="10" fill="#f25022"/>
        <rect x="11" width="10" height="10" fill="#7fba00"/>
        <rect y="11" width="10" height="10" fill="#00a4ef"/>
        <rect x="11" y="11" width="10" height="10" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </button>

    <p class="footer-note">
      Use your <strong>Hope International</strong> Microsoft account.<br>
      Unauthorized access is prohibited.
    </p>
  </div>
</div>
