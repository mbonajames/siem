services:
  backend:
    build:
      context: ./APIGateway
    container_name: siem-api
    restart: unless-stopped
    env_file: ./APIGateway/.env
    environment:
      - VULN_STORAGE_PATH=/app/vuln_data
    volumes:
      - vuln_data:/app/vuln_data
      - ./siem-dashboard/src/assets/images:/app/assets/images:ro
    networks:
      - siem-net
    # Port 8000 is NOT exposed externally — only reachable via the nginx proxy

  frontend:
    build:
      context: ./siem-dashboard
    container_name: siem-ui
    restart: unless-stopped
    ports:
      - "9443:8443"
    volumes:
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - siem-net

volumes:
  vuln_data:
    driver: local

networks:
  siem-net:
    driver: bridge
